- script: |
    echo ScanCentral version check.
    scancentral -version
    whoami
    echo WI scan.
    wi.exe -u http://zero.webappsecurity.com/ -c -ps 4 -w test -f test.pdf -gp -ag
  displayName: 'Run BEROE scancentral version check & WI scan'

